<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Occupancy Performance Dashboard</title>
	<link rel="stylesheet" type="text/css" href="styles.css">
    <style>
        /* Add your CSS styling here */
        #dashboard {
            display: flex;
        }
#summary {
    width: 250px;
    height: 200px;
    padding: 20px;
    border: 1px solid #ddd;
    border-radius: 5px;
    background-color: #f9f9f9;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.15);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 16px;
    color: #333;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

#summary h2 {
    margin: 0;
    color: #555;
    font-size: 24px;
    font-weight: 600;
}

#summary p {
    margin: 0;
    color: #777;
    font-size: 20px;
    font-weight: 400;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Include the Chart.js library -->
</head>
<body>
    <h1>Vehicle Occupancy Performance Dashboard</h1>

    <!-- <label for="days">Choose a day:</label>
    <select id="days" name="days">
        <option value="monday">Monday</option>
        <option value="tuesday">Tuesday</option>
        <option value="wednesday">Wednesday</option>
        </select><!-- Add the rest of the days -->
   

    <div id="dashboard">
        <div style="width:800px; height:800px;">
            <canvas id="chart1"></canvas> <!-- Canvas element for the first chart -->
			 <canvas id="chart2"></canvas> <!-- Canvas element for the second chart -->
        </div>
<div id="summary">
    <h2>Summary of Total Request Orders</h2>
    <label for="days">Choose a day:</label>
    <select id="days" name="days">
        <option value="monday">Monday</option>
        <option value="tuesday">Tuesday</option>
        <option value="wednesday">Wednesday</option>
        <!-- Add the rest of the days -->
    </select>
    <p id="total"></p>
</div>

    </div>




    <script>
        // Add your JavaScript here to update the dashboard based on the selected day

        // Sample data
        var vehicleTypes = ['Vellfire','Alphard', 'Benz','BMW', 'Bentley', 'Rolls Royce','OutSource'];
        var requestOrders = {
            monday: [100, 70, 180, 120, 30, 10, 350], // Number of request orders for each vehicle type on Monday
            tuesday: [120, 160, 210, 100, 15, 5, 270], // Number of request orders for each vehicle type on Tuesday
            wednesday: [90, 100, 150, 110, 5, 10, 280] // Number of request orders for each vehicle type on Wednesday
            // Add the rest of the days
        };

        // Create the charts
        var ctx1 = document.getElementById('chart1').getContext('2d');
        var chart1 = new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: vehicleTypes,
                datasets: [{
                    label: 'Number of Request Orders',
                    data: requestOrders.monday, // Default to Monday's data
                   backgroundColor: [
                'rgba(255, 99, 132, 0.2)',  // Color for the first bar
                'rgba(54, 162, 235, 0.2)',  // Color for the second bar
                'rgba(255, 206, 86, 0.2)',  // Color for the third bar
                'rgba(75, 192, 192, 0.2)',  // Color for the fourth bar
                'rgba(153, 102, 255, 0.2)', // Color for the fifth bar
                'rgba(255, 159, 64, 0.2)'   // Color for the sixth bar
                // Add more colors if you have more bars
            ],
                    borderColor: [
                'rgba(255, 99, 132, 1)',
                'rgba(54, 162, 235, 1)',
                'rgba(255, 206, 86, 1)',
                'rgba(75, 192, 192, 1)',
                'rgba(153, 102, 255, 1)',
                'rgba(255, 159, 64, 1)'
                // Add more colors if you have more bars
            ],
            borderWidth: 1
        }]
    },
    options: {
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});
        var ctx2 = document.getElementById('chart2').getContext('2d');
        var chart2 = new Chart(ctx2, {
            type: 'line',
            data: {
                labels: vehicleTypes,
                datasets: [{
                    label: 'Number of Request Orders',
                    data: requestOrders.monday, // Default to Monday's data
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        // Update the charts and summary when the selected day changes
        document.getElementById('days').addEventListener('change', function(event) {
            var selectedDay = event.target.value;
            chart1.data.datasets[0].data = requestOrders[selectedDay];
            chart1.update();
            chart2.data.datasets[0].data = requestOrders[selectedDay];
            chart2.update();

            // Calculate the total number of request orders for the selected day
            var total = requestOrders[selectedDay].reduce(function(a, b) {
                return a + b;
            }, 0);

            // Update the summary
            document.getElementById('total').textContent = 'Total: ' + total;
        });
    </script>
</body>
</html>
