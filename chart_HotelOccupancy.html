<!DOCTYPE html>
<html>
<head>
    <title>Performance Dashboard</title>
    <style>

    #roomTable {
        font-family: Arial, sans-serif;
        border-collapse: collapse;
        width: 100%;
    }

    #roomTable td, #roomTable th {
        border: 1px solid #ddd;
        padding: 8px;
    }

    #roomTable tr:nth-child(even) {
        background-color: #f2f2f2;
    }

    #roomTable tr:hover {
        background-color: #ddd;
    }

    #roomTable th {
        padding-top: 12px;
        padding-bottom: 12px;
        text-align: left;
        background-color: #4CAF50;
        color: white;
    }
</style>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>MIS Hotel Occupancy Performance Dashboard</h1>

    <!-- Your table goes here -->
	
	
<div style="display: flex; justify-content: space-between;">
    <div style="width:900px; height:500px;">
        <canvas id="barChart" ></canvas> 
		 <p>Hotel Occupancy Performance Dashboard.</p>
    </div>
   
</div>


<!-- Your table goes here -->
<table id="roomTable" border="1">
    <tr>
        <th>Room Type</th>
        <th>Monday</th>
        <th>Tuesday</th>
        <th>Wednesday</th>
        <th>Thursday</th>
        <th>Friday</th>
        <th>Saturday</th>
        <th>Sunday</th>
    </tr>
    <tr>
        <td>Single</td>
        <td>20</td>
        <td>22</td>
        <td>18</td>
        <td>24</td>
        <td>26</td>
        <td>28</td>
        <td>30</td>
    </tr>
    <tr>
        <td>Double</td>
        <td>25</td>
        <td>27</td>
        <td>23</td>
        <td>29</td>
        <td>31</td>
        <td>33</td>
        <td>35</td>
    </tr>
    <tr>
        <td>Deluxe</td>
        <td>30</td>
        <td>32</td>
        <td>28</td>
        <td>34</td>
        <td>36</td>
        <td>38</td>
        <td>40</td>
    </tr>
    <tr>
        <td>Suite</td>
        <td>35</td>
        <td>37</td>
        <td>33</td>
        <td>39</td>
        <td>41</td>
        <td>43</td>
        <td>45</td>
    </tr>
	
	 <tr>
        <td><strong>Total</strong></td>
        <td id="totalMonday"></td>
        <td id="totalTuesday"></td>
        <td id="totalWednesday"></td>
        <td id="totalThursday"></td>
        <td id="totalFriday"></td>
        <td id="totalSaturday"></td>
        <td id="totalSunday"></td>
    </tr>
</table>

<!-- Your chart goes here -->
<div style="width:900px; height:900px;">
    <canvas id="roomChart"></canvas> 
</div>

<script>
    var ctx = document.getElementById('roomChart').getContext('2d');
    var myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'],
            datasets: [{
                label: 'Single',
                data: [20, 22, 18, 24, 26, 28, 30], // replace with your data
                backgroundColor: 'rgba(75, 192, 192, 0.2)',
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 1
            },
            {
                label: 'Double',
                data: [25, 27, 23, 29, 31, 33, 35], // replace with your data
                backgroundColor: 'rgba(153, 102, 255, 0.2)',
                borderColor: 'rgba(153, 102, 255, 1)',
                borderWidth: 1
            },
            {
                label: 'Deluxe',
                data: [30, 32, 28, 34, 36, 38, 40], // replace with your data
                backgroundColor: 'rgba(255, 159, 64, 0.2)',
                borderColor: 'rgba(255, 159, 64, 1)',
                borderWidth: 1
            },
            {
                label: 'Suite',
                data: [35, 37, 33, 39, 41, 43, 45], // replace with your data
                backgroundColor: 'rgba(255, 99, 132, 0.2)',
                borderColor: 'rgba(255, 99, 132, 1)',
                borderWidth: 1
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    var ctx = document.getElementById('barChart').getContext('2d');
    var myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'],
            datasets: [{
                label: '# of Hotel Bookings',
                data: [20, 30, 25, 35, 40, 45, 50], // replace with your data
                backgroundColor: 'rgba(54, 162, 235, 0.2)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1
            },
            {
                label: '# of Occupancy',
                data: [15, 25, 20, 30, 35, 40, 45], // replace with your data
                backgroundColor: 'rgba(255, 206, 86, 0.2)',
                borderColor: 'rgba(255, 206, 86, 1)',
                borderWidth: 1
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    })
	// Your room data
var roomData = {
    'Single': [20, 22, 18, 24, 26, 28, 30],
    'Double': [25, 27, 23, 29, 31, 33, 35],
    'Deluxe': [30, 32, 28, 34, 36, 38, 40],
    'Suite': [35, 37, 33, 39, 41, 43, 45]
};

// Calculate total occupancy for each day
var totalOccupancy = [0, 0, 0, 0, 0, 0, 0];
for (var roomType in roomData) {
    for (var i = 0; i < 7; i++) {
        totalOccupancy[i] += roomData[roomType][i];
    }
}

// Update the table
document.getElementById('totalMonday').innerText = totalOccupancy[0];
document.getElementById('totalTuesday').innerText = totalOccupancy[1];
document.getElementById('totalWednesday').innerText = totalOccupancy[2];
document.getElementById('totalThursday').innerText = totalOccupancy[3];
document.getElementById('totalFriday').innerText = totalOccupancy[4];
document.getElementById('totalSaturday').innerText = totalOccupancy[5];
document.getElementById('totalSunday').innerText = totalOccupancy[6];
	
	
	
</script>
</body>
</html>
